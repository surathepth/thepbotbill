    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #020c1b 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .hub-container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        
        .brand-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            margin-bottom: 20px;
        }
        
        .brand-title {
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #00ff88, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .brand-subtitle {
            font-size: 0.95rem;
            color: #a8b2d1;
            margin-bottom: 30px;
        }
        
        .hub-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 15px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .hub-btn i {
            margin-right: 12px;
            font-size: 1.3rem;
        }
        
        /* Button 1: Index */
        .btn-app {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            color: #00ff88;
        }
        .btn-app:hover {
            background: #00ff88;
            color: #020c1b;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            transform: translateY(-3px);
        }
        
        /* Button 2: Sale */
        .btn-sale {
            background: rgba(255, 87, 34, 0.1);
            border: 2px solid #ff5722;
            color: #ff5722;
        }
        .btn-sale:hover {
            background: #ff5722;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 87, 34, 0.6);
            transform: translateY(-3px);
        }
        
        /* Button 3: Card */
        .btn-card {
            background: rgba(52, 152, 219, 0.1);
            border: 2px solid #3498db;
            color: #3498db;
        }
        .btn-card:hover {
            background: #3498db;
            color: #fff;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.6);
            transform: translateY(-3px);
        }
        
        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #64ffda;
        }
    </style>

<body>

    <div class="hub-container">
        <!-- โลโก้ หรือ รูปพรีวิว -->
        <img src="20002.jpg" alt="ThepAgentBill Logo" class="brand-logo" onerror="this.src='https://via.placeholder.com/120/0a192f/00ff88?text=Thep'">
        
        <h1 class="brand-title">ThepAgentBill</h1>
        <p class="brand-subtitle">ราคาหลักร้อย ทำงานให้ในราคาหลักหมื่น</p>
        
        <!-- ปุ่มเข้าแอปคิดเงิน -->
        <a href="index.html" class="hub-btn btn-app">
            <i class="fas fa-calculator"></i> เข้าสู่ระบบเครื่องคิดเงิน
        </a>
        
        <!-- ปุ่มเซลล์เพจ โปรโมชัน -->
        <a href="sale.html" class="hub-btn btn-sale">
            <i class="fas fa-gift"></i> ดูโปรโมชัน / สั่งซื้อ
        </a>
        
        <!-- ปุ่มนามบัตร ติดต่อเรา -->
        <a href="card.html" class="hub-btn btn-card">
            <i class="fas fa-id-card"></i> นามบัตร / ติดต่อผู้บริหาร
        </a>
        
        <!-- ข้อมูลติดต่อเพิ่มเติม -->
        <div class="mt-4 mb-2">
            <p class="mb-3" style="color: #64ffda; font-size: 0.95rem; font-weight: 400;">
                <i class="fas fa-phone-alt me-2"></i> โทร: <span style="white-space: nowrap;">098-7707456, 094-9975679</span>
            </p>
            <img src="QRCODE-Line-0949975679.JPG" alt="Line QR Code" class="img-fluid rounded" style="max-width: 130px; border: 2px solid #00ff88; padding: 2px; background: white;">
        </div>
        
        <div class="footer-text">
            &copy; 2026 ThepAgentBill. All rights reserved.
        </div>
